# Versal VCK190 EVK — board domains.yaml (starter).
#
# Standard openamp,domain-v1 shape. Two roles in one file:
#
#   1. Integration declarations — facts the upstream Linux DT and
#      Zephyr DT do not carry that need to become first-class SDT
#      nodes: reserved-memory carve-outs (memory entries with
#      `no-map: true`) and any board-only peripherals (access
#      entries carrying their own properties) absent from both
#      upstream trees. assemble_sdt walks this file at SDT-build
#      time and injects each declared node into the SDT.
#
#   2. Partition intent — which device / memory / cluster belongs
#      to which OS. The downstream Lopper domain-processing tools
#      (gen_domain_dts, openamp, etc.) consume this side of the
#      file after the SDT exists.
#
# This is the shipped per-board template. Do NOT edit it in place
# (a git pull would clobber your changes). Instead, keep a small
# overlay file of just your deployment's changes and pass it with
# --domains; the pipeline deep-merges your overlay on top of this
# template. Use sdt-domains.yaml (auto-generated alongside the SDT)
# as a reference for what the SDT contains and as a starting point
# for the partition section.

domains:
  default:
    compatible: openamp,domain-v1
    id: 0
    domains:
      RPU:
        compatible: openamp,domain-v1
        # Reserved DDR carve-out for the R5 firmware blob the APU
        # (Linux remoteproc) loads before bringing the RPU out of
        # reset. 64 MiB at the top of low-DDR is a common Versal
        # convention; adjust per the actual openamp integration
        # plan. `no-map: true` marks this as a /reserved-memory
        # declaration assemble_sdt will inject into the SDT.
        memory:
          - dev: rpu0_reserved
            start: 0x3e000000
            size: 0x4000000          # 64 MiB
            no-map: true
