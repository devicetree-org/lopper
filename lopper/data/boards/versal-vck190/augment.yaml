# Versal VCK190 EVK — board augmentation (placeholder).
#
# This is the user-side hand-written input that fills in what Linux DT
# can't carry: additional CPU clusters (R5, microblaze), TCM/OCM that
# Linux doesn't address, reserved-memory carve-outs for non-Linux
# contexts, partition intent.
#
# Empty for now — compose_devices in its M4 form does Linux DT
# extraction only and ignores this file. The M9 overlay handler will
# pick this up and merge it into the generated inventory.
#
# When populated, this file uses the openamp,domain-v1,board-augment
# compatible (see sdt-from-linux design §6.1):
#
# domains:
#   vck190:
#     compatible: openamp,domain-v1,board-augment
#     soc_family: xlnx,versal
#     board: xlnx,versal-vck190-revA
#     cpus:
#       - dev: cpus-r5@0
#         compatible: arm,cortex-r5
#         cpumask: 0x3
#     sram:
#       - dev: psv_r5_0_atcm@0
#         start: 0x0
#         size: 0x10000
#     # … etc.

domains: {}
