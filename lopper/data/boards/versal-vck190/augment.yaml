# Versal VCK190 EVK — board augmentation (M9 overlay input).
#
# Hand-authored facts that Linux DT and Zephyr DT do not carry:
# integration-level decisions (which DDR region holds the R5
# firmware blob, which OS owns which IPI channel, etc.) and any
# board peripherals not present in either upstream tree.
#
# Schema: openamp,domain-v1,board-augment (see sdt-from-linux
# design §6.1). Inventory blocks (cpus, memory, sram, access) get
# merged into the compose_devices output with `source: augment`
# tags so the provenance is observable.
#
# Empty blocks are fine — the merger only touches what's present.

domains:
  vck190:
    compatible: openamp,domain-v1,board-augment
    soc_family: xlnx,versal
    board: xlnx,versal-vck190-revA

    # Reserved DDR carve-out for the R5 firmware blob the APU
    # (Linux remoteproc) loads before bringing the RPU out of reset.
    # 64 MiB at the top of the low-DDR region is a common Versal
    # convention; adjust per the actual openamp integration plan.
    memory:
      - dev: rpu0_reserved
        start: 0x3e000000
        size: 0x4000000           # 64 MiB
        no-map: true