      i2c0: /axi/i2c@ff020000
      i2c1: /axi/i2c@ff030000
      mmc0: /axi/mmc@f1050000
      nvmem0: /axi/i2c@ff030000/eeprom@54
      rtc0: /axi/rtc@f12a0000
      serial0: /axi/serial@ff000000
      serial2: /dcc
      spi0: /axi/spi@f1010000
      usb0: /axi/usb@ff9d0000
    board: xlnx,versal-vek280-revB
    compatible: openamp,domain-v1,devices
    cpus:
    - compatible: arm,cortex-a72
      cpumask: 0x3
      dev: cpus
    - compatible: arm,cortex-r5f
      cpumask: 0x1
      dev: cpus-r5@0
    - compatible: pmc-microblaze
      cpumask: 0x1
      dev: cpus-pmc@0
    - compatible: psm-microblaze
      cpumask: 0x1
      dev: cpus-psm@0
    id: 0
    memory:
    - dev: memory@0
      size: 0x80000000
    - dev: memory@800000000
      size: 0x180000000
      start: 0x800000000
    - dev: memory@fffc0000
      size: 0x40000
      start: 0xfffc0000
    - dev: linux,cma
    - dev: rpu0_reserved@3e000000
      size: 0x4000000
      start: 0x3e000000
    model: Xilinx Versal vek280 Eval board revB
    soc_family: xlnx,versal
    sram:
    - dev: bbram-zeroize@4
      size: 0x4
      start: 0x4
    - dev: bbram-key@10
      size: 0x20
      start: 0x10
    - dev: bbram-usr@30
      size: 0x4
      start: 0x30
    - dev: bbram-lock@48
      size: 0x4
      start: 0x48
